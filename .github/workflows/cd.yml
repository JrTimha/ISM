name: CD

# Builds and publishes the Docker image to GHCR. Runs exclusively on release
# tags (v*.*.*) — never on master pushes/merges or the development branch. This
# guarantees a given commit is built and published exactly once: when it is
# tagged for release. Merges to master only run CI quality checks (ci.yml).
#
# Git tags are not bound to a branch, so a `v*.*.*` tag could be pushed onto any
# commit (e.g. on development). The `guard` job below rejects any tag whose commit
# is not contained in master, so only master commits ever produce a release image.
on:
  push:
    tags: [ "v*.*.*" ]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  guard:
    name: Verify tag is on master
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is contained in master
        run: |
          git fetch --no-tags origin +refs/heads/master:refs/remotes/origin/master
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Tagged commit $GITHUB_SHA is on master — proceeding."
          else
            echo "::error::Tag '$GITHUB_REF_NAME' points to a commit that is not on master. Release images are only published from master — merge to master first, then tag the master commit."
            exit 1
          fi

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Clippy
        # Static analysis. Warnings are reported but do not fail the build yet;
        # re-add `-- -D warnings` to enforce a clean lint once the backlog is cleared.
        run: cargo clippy --all-targets --locked

      - name: Test
        run: cargo test --all-targets --locked

  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/jrtimha/ism
          # A single release tag (e.g. v0.8.2) produces one image digest carrying
          # these aliases: v0.8.2 (ref), 0.8.2 (semver), 0.8 (major.minor), latest.
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build & Push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
